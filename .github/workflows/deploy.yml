name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Check page weight
        run: node scripts/bundle-gate.mjs

      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          # Enable GitHub Pages (source: GitHub Actions) on the first run,
          # so the deploy does not depend on a manual repo settings step.
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Notify IndexNow (Bing)
        run: |
          curl -s -o /dev/null -w "%{http_code}" -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d '{
              "host": "eckstein.io",
              "key": "6a0c3658126e1be4f1618550b69c5b14",
              "keyLocation": "https://eckstein.io/6a0c3658126e1be4f1618550b69c5b14.txt",
              "urlList": [
                "https://eckstein.io/",
                "https://eckstein.io/en/"
              ]
            }'
